<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zomer Leeravontuur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EAF6FB;
    --ink: #1C3144;
    --card: #FFFFFF;
    --rekenen: #FF7B54;
    --rekenen-soft: #FFE3D6;
    --spelling: #2E9C8F;
    --spelling-soft: #D8F3EF;
    --lezen: #E8AA1B;
    --lezen-soft: #FFF1D2;
    --success: #4CAF7D;
    --shadow: 0 8px 24px rgba(28,49,68,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background:
      radial-gradient(circle at 10% 10%, #d7f0fb 0%, transparent 45%),
      radial-gradient(circle at 90% 20%, #fff3d6 0%, transparent 40%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 12px 48px;
  }
  h1,h2,h3, .display{ font-family:'Baloo 2', sans-serif; }
  #app{ width:100%; max-width:640px; }
  .hidden{ display:none !important; }
  .card{ background:var(--card); border-radius:24px; box-shadow:var(--shadow); padding:24px; }
  .center{ text-align:center; }
  button{ font-family:inherit; cursor:pointer; border:none; }
  .btn-primary{
    background:var(--ink); color:white; padding:14px 28px; border-radius:16px;
    font-weight:800; font-size:16px; font-family:'Baloo 2', sans-serif;
    box-shadow:0 4px 0 rgba(0,0,0,0.15);
  }
  .btn-primary:active{ transform:translateY(2px); box-shadow:none; }
  .btn-ghost{ background:transparent; color:var(--ink); font-weight:700; padding:10px 16px; border-radius:12px; }
  .btn-ghost:hover{ background:rgba(28,49,68,0.06); }
  .icon-btn{
    background:rgba(28,49,68,0.06); border-radius:14px; padding:8px 12px; font-size:18px; font-weight:800;
    display:flex; align-items:center; gap:6px;
  }
  .icon-btn:hover{ background:rgba(28,49,68,0.1); }

  /* ---- Profile select ---- */
  .top-title{ text-align:center; margin-bottom:28px; }
  .top-title h1{ font-size:32px; margin:0 0 4px; }
  .top-title p{ margin:0; opacity:0.75; font-weight:600; }
  .profiles-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:14px; margin-top:20px; }
  .profile-tile{
    background:var(--card); border-radius:20px; box-shadow:var(--shadow); padding:16px 8px;
    text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .profile-tile .avatar{ font-size:40px; }
  .profile-tile .name{ font-weight:800; font-family:'Baloo 2'; }
  .profile-tile .stars{ font-size:12px; opacity:0.7; font-weight:700; }
  .add-tile{
    border:3px dashed #b9d9e6; border-radius:20px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; padding:16px 8px; color:#5b8aa0;
    font-weight:800; font-family:'Baloo 2'; background:transparent;
  }
  .avatar-picker{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:14px 0; }
  .avatar-choice{ font-size:28px; background:#f2f7fa; border-radius:14px; padding:8px 10px; }
  .avatar-choice.selected{ background:var(--rekenen-soft); outline:3px solid var(--rekenen); }
  input[type="text"]{
    width:100%; padding:12px 14px; border-radius:12px; border:2px solid #d7e6ee;
    font-size:16px; font-family:'Nunito'; margin-top:6px;
  }

  /* ---- Map screen ---- */
  .map-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; gap:10px; flex-wrap:wrap; }
  .map-header .who{ display:flex; align-items:center; gap:10px; }
  .map-header .who .avatar{ font-size:34px; }
  .map-header .who .name{ font-weight:800; font-family:'Baloo 2'; font-size:20px; }
  .map-header .actions{ display:flex; gap:8px; align-items:center; }
  .island{
    display:flex; align-items:center; gap:16px; background:var(--card); border-radius:20px;
    box-shadow:var(--shadow); padding:16px; margin-bottom:14px; text-align:left; width:100%;
  }
  .island .icon{ width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
  .island .info{ flex:1; }
  .island .info .title{ font-family:'Baloo 2'; font-weight:800; font-size:18px; margin:0; }
  .island .info .sub{ font-size:13px; opacity:0.7; font-weight:600; margin-top:2px; }
  .island .stars{ font-size:15px; letter-spacing:1px; }
  .island.soon{ opacity:0.55; }

  /* ---- Level picker ---- */
  .level-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  .level-btn{
    padding:14px 4px; border-radius:16px; background:#f2f7fa; font-family:'Baloo 2';
    font-weight:700; font-size:14px; text-align:center; border:3px solid transparent;
  }
  .level-btn.active{ border-color:var(--ink); background:white; }
  #level-info{ font-weight:700; margin-top:16px; opacity:0.8; font-size:14px; }

  /* ---- Quiz ---- */
  .quiz-stopline{ display:flex; justify-content:flex-end; margin-bottom:4px; }
  .progress-bar{ height:10px; background:#eaf1f5; border-radius:6px; overflow:hidden; margin-bottom:18px; }
  .progress-fill{ height:100%; border-radius:6px; transition:width .3s ease; }
  .quiz-topline{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-weight:800; font-family:'Baloo 2'; font-size:14px; }
  .passage-box{ background:#f7fbfd; border-radius:16px; padding:16px; margin-bottom:16px; line-height:1.6; font-size:15px; }
  .question-text{ font-size:20px; font-weight:800; font-family:'Baloo 2'; margin:6px 0 18px; line-height:1.4; }
  .choices{ display:grid; gap:10px; }
  .choice-btn{
    background:#f2f7fa; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700;
    text-align:left; border:3px solid transparent; transition:all .15s ease;
  }
  .choice-btn:active{ transform:scale(0.98); }
  .choice-btn.correct{ background:#e3f6ec; border-color:var(--success); }
  .choice-btn.wrong{ background:#fde7e2; border-color:#e0563c; }
  .choice-btn.dim{ opacity:0.5; }
  .feedback{ margin-top:14px; font-weight:800; font-family:'Baloo 2'; min-height:24px; }
  .explanation-box{
    margin-top:10px; background:#fff7ec; border-radius:14px; padding:12px 14px;
    font-size:14px; line-height:1.5; color:#6b4b12; font-weight:600;
  }

  /* ---- Result ---- */
  .stars-big{ font-size:52px; letter-spacing:6px; margin:10px 0; }
  .result-msg{ font-size:19px; font-weight:800; font-family:'Baloo 2'; margin:6px 0 4px; }
  .result-sub{ opacity:0.75; font-weight:600; margin-bottom:6px; }
  .result-points{ font-weight:800; font-family:'Baloo 2'; color:var(--success); margin-bottom:22px; }

  .back-link{ margin-bottom:14px; display:inline-block; }

  /* ---- Calendar ---- */
  .cal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .cal-header .month-label{ font-family:'Baloo 2'; font-weight:800; font-size:19px; }
  .cal-nav-btn{ background:#f2f7fa; border-radius:12px; padding:8px 12px; font-size:16px; font-weight:800; }
  .cal-summary{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .cal-chip{ flex:1; min-width:110px; background:#f2f7fa; border-radius:14px; padding:10px 12px; text-align:center; }
  .cal-chip .num{ font-family:'Baloo 2'; font-weight:800; font-size:20px; }
  .cal-chip .lbl{ font-size:11px; font-weight:700; opacity:0.7; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-dow{ text-align:center; font-size:11px; font-weight:800; opacity:0.55; padding-bottom:4px; }
  .cal-day{
    aspect-ratio:1; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#f5f9fb; font-size:12px; font-weight:700; gap:2px;
  }
  .cal-day.empty{ background:transparent; }
  .cal-day.today{ outline:2px solid var(--ink); }
  .cal-day .pts{ font-size:10px; font-weight:800; }
  .cal-day.lvl1{ background:#d7f0e1; color:#1f5c3f; }
  .cal-day.lvl2{ background:#a9e2c1; color:#175636; }
  .cal-day.lvl3{ background:#63c98f; color:#0e3d24; }
  .cal-day.lvl4{ background:#2fa768; color:#ffffff; }
</style>
</head>
<body>
<div id="app">

  <!-- SCREEN: profiles -->
  <div id="screen-profiles">
    <div class="top-title">
      <h1>🏝️ Zomer Leeravontuur</h1>
      <p>Kies wie er op avontuur gaat!</p>
    </div>
    <div class="profiles-grid" id="profiles-grid"></div>
  </div>

  <!-- SCREEN: add profile -->
  <div id="screen-add" class="hidden">
    <button class="btn-ghost back-link" onclick="goProfiles()">← Terug</button>
    <div class="card">
      <h2 class="center" style="margin-top:0;">Nieuw avontuur starten</h2>
      <label style="font-weight:700;">Hoe heet je?</label>
      <input type="text" id="new-name" placeholder="Typ je naam..." maxlength="16">
      <p style="font-weight:700; margin-bottom:0;">Kies je held:</p>
      <div class="avatar-picker" id="avatar-picker"></div>
      <button class="btn-primary" style="width:100%; margin-top:8px;" onclick="createProfile()">Start het avontuur! 🚀</button>
    </div>
  </div>

  <!-- SCREEN: map -->
  <div id="screen-map" class="hidden">
    <button class="btn-ghost back-link" onclick="goProfiles()">← Andere avonturier</button>
    <div class="card">
      <div class="map-header">
        <div class="who">
          <div class="avatar" id="map-avatar"></div>
          <div class="name" id="map-name"></div>
        </div>
        <div class="actions">
          <button class="icon-btn" onclick="goCalendar()">📅 <span id="map-total-points">0</span> pt</button>
        </div>
      </div>

      <button class="island" style="background-color:var(--rekenen-soft);" onclick="openLevelPicker('rekenen')">
        <div class="icon" style="background:var(--rekenen);">🔢</div>
        <div class="info">
          <p class="title">Rekenland</p>
          <p class="sub" id="sub-rekenen">Optellen, aftrekken, keren & delen</p>
        </div>
        <div class="stars" id="stars-rekenen">☆☆☆</div>
      </button>

      <button class="island" style="background-color:var(--spelling-soft);" onclick="openLevelPicker('spelling')">
        <div class="icon" style="background:var(--spelling);">✏️</div>
        <div class="info">
          <p class="title">Spellingstad</p>
          <p class="sub" id="sub-spelling">Woorden goed schrijven</p>
        </div>
        <div class="stars" id="stars-spelling">☆☆☆</div>
      </button>

      <button class="island" style="background-color:var(--lezen-soft);" onclick="openLevelPicker('lezen')">
        <div class="icon" style="background:var(--lezen);">📖</div>
        <div class="info">
          <p class="title">Leeseiland</p>
          <p class="sub" id="sub-lezen">Verhalen lezen & vragen beantwoorden</p>
        </div>
        <div class="stars" id="stars-lezen">☆☆☆</div>
      </button>

      <div class="island soon">
        <div class="icon" style="background:#c9c9c9;">🇬🇧</div>
        <div class="info"><p class="title">Engelse Baai</p><p class="sub">Binnenkort te ontdekken!</p></div>
      </div>
      <div class="island soon">
        <div class="icon" style="background:#c9c9c9;">🇪🇸</div>
        <div class="info"><p class="title">Spaanse Kust</p><p class="sub">Binnenkort te ontdekken!</p></div>
      </div>
    </div>
  </div>

  <!-- SCREEN: level picker -->
  <div id="screen-level" class="hidden">
    <button class="btn-ghost back-link" onclick="goMap()">← Terug naar kaart</button>
    <div class="card center">
      <h2 id="level-title" style="margin-top:0;"></h2>
      <p style="opacity:0.7; font-weight:600; margin-top:-8px;">Kies je groep</p>
      <div class="level-row" id="level-row"></div>
      <p id="level-info"></p>
      <button class="btn-primary" style="width:100%; margin-top:12px;" onclick="startQuiz()">Begin! →</button>
    </div>
  </div>

  <!-- SCREEN: quiz -->
  <div id="screen-quiz" class="hidden">
    <div class="card">
      <div class="quiz-stopline">
        <button class="btn-ghost" style="font-size:13px;" onclick="confirmStopQuiz()">✕ Stoppen</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>
      <div class="quiz-topline">
        <span id="quiz-subject-label"></span>
        <span id="quiz-counter"></span>
      </div>
      <div id="passage-box" class="passage-box hidden"></div>
      <div class="question-text" id="quiz-question"></div>
      <div class="choices" id="quiz-choices"></div>
      <div class="feedback" id="quiz-feedback"></div>
      <div class="explanation-box hidden" id="quiz-explanation"></div>
      <button class="btn-primary hidden" id="quiz-next-btn" style="width:100%; margin-top:16px;" onclick="goNextQuestion()">Volgende vraag →</button>
    </div>
  </div>

  <!-- SCREEN: result -->
  <div id="screen-result" class="hidden">
    <div class="card center">
      <div class="stars-big" id="result-stars"></div>
      <p class="result-msg" id="result-msg"></p>
      <p class="result-sub" id="result-sub"></p>
      <p class="result-points" id="result-points"></p>
      <button class="btn-primary" style="width:100%;" onclick="goMap()">Terug naar de kaart</button>
    </div>
  </div>

  <!-- SCREEN: calendar -->
  <div id="screen-calendar" class="hidden">
    <button class="btn-ghost back-link" onclick="goMap()">← Terug naar kaart</button>
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="changeCalMonth(-1)">←</button>
        <div class="month-label" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="changeCalMonth(1)">→</button>
      </div>
      <div class="cal-summary">
        <div class="cal-chip"><div class="num" id="cal-total-points">0</div><div class="lbl">punten totaal</div></div>
        <div class="cal-chip"><div class="num" id="cal-streak">0</div><div class="lbl">dagen op rij</div></div>
        <div class="cal-chip"><div class="num" id="cal-days-month">0</div><div class="lbl">dagen actief deze maand</div></div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

</div>

<script>
/* ============ DATA ============ */
const AVATARS = ['🦁','🐯','🐸','🦄','🐬','🐼','🦊','🐰','🐨','🐵','🐶','🐱'];
const SUBJECT_META = {
  rekenen:  { label:'Rekenland',    color:'var(--rekenen)' },
  spelling: { label:'Spellingstad', color:'var(--spelling)' },
  lezen:    { label:'Leeseiland',   color:'var(--lezen)' }
};
const GROEPEN = [3,4,5,6,7,8];

/* Spelling- en leesinhoud is per twee groepen gebundeld (3&4 / 5&6 / 7&8).
   Rekenen genereert wel per groep én per niveau (1,2,3) apart, omdat dat volledig automatisch gaat. */
function contentTierFor(groep){
  if(groep <= 4) return 'a';
  if(groep <= 6) return 'b';
  return 'c';
}

const SPELLING_BANK = {
  a: [
    {s:"De ___ vliegt hoog in de lucht.", o:["vogel","vogol","vogul"], c:0, u:"Je hoort een duidelijke o-klank, die schrijf je met één o: vo-gel."},
    {s:"Ik doe mijn ___ aan voor ik naar buiten ga.", o:["jasje","jassje","jashe"], c:0, u:"Je schrijft maar één s in jasje; de sj-klank schrijf je met 's' + 'j'."},
    {s:"We gaan zwemmen in het ___.", o:["zwembad","swembad","zwembadt"], c:0, u:"Het woord begint met 'zw', niet met 's': zwem-bad."},
    {s:"De kat drinkt ___.", o:["melk","melc","melck"], c:0, u:"De k-klank aan het einde schrijf je met een 'k', niet met 'c'."},
    {s:"Mijn broer speelt met de ___.", o:["bal","bhal","balh"], c:0, u:"Gewoon 'bal', zonder extra letters."},
    {s:"In de herfst vallen de ___ van de boom.", o:["blaadjes","bladjes","blaatjes"], c:0, u:"Van 'blad' naar meervoud verdubbel je de a: bla-a-djes."},
    {s:"Wij eten een lekker ___ brood.", o:["bruin","bruen","bruijn"], c:0, u:"De klank 'ui' schrijf je met u+i: bruin."},
    {s:"Hij ___ heel hard tijdens de wedstrijd.", o:["rent","rend","reent"], c:0, u:"Bij 'hij rent' schrijf je een 't' aan het einde, ook al hoor je soms een d-klank."},
    {s:"De ___ schijnt vandaag fel.", o:["zon","son","zonn"], c:0, u:"Het woord begint met 'z', en heeft maar één n."},
    {s:"Zij tekent een mooie ___.", o:["tekening","teekening","tekenig"], c:0, u:"Van 'tekenen' maak je 'tekening', met één e in de eerste lettergreep."},
    {s:"We slapen lekker in ons ___.", o:["bed","bedd","bett"], c:0, u:"Kort woord, één d aan het eind: bed."},
    {s:"De ___ blaft heel hard.", o:["hond","hondt","hont"], c:0, u:"Het woord eindigt op 'd', ook al hoor je een t-klank: hond."}
  ],
  b: [
    {s:"Hij ___ (rennen) elke dag naar school.", o:["rent","rennt","reent"], c:0, u:"Bij de hij-vorm van 'rennen' laat je één n vallen: hij rent."},
    {s:"We hebben een nieuwe ___ gekocht.", o:["bank","bangk","banck"], c:0, u:"De nk-klank schrijf je gewoon met 'n' + 'k': bank."},
    {s:"De ___ van het huis is groen geverfd.", o:["deur","duer","deurr"], c:0, u:"De tweeklank is 'eu': deur."},
    {s:"Zij ___ (wandelen) elke ochtend een rondje.", o:["wandelt","wandeld","wandellt"], c:0, u:"Bij zij + werkwoord op -en schrijf je de t-uitgang: wandelt."},
    {s:"Het is een hele ___ afstand naar school.", o:["lange","langge","lanke"], c:0, u:"'Lang' + e krijgt maar één g erbij: lange."},
    {s:"We ___ (zitten) al de hele middag te wachten.", o:["zitten","zittn","ziten"], c:0, u:"Korte klank i, dubbele t door de gesloten lettergreep: zit-ten."},
    {s:"Mijn oma bakt een heerlijke ___.", o:["appeltaart","appeltart","appletaart"], c:0, u:"Samenstelling van 'appel' + 'taart', met dubbele p en dubbele a in taart."},
    {s:"De trein ___ (vertrekken) over vijf minuten.", o:["vertrekt","vertrekd","vertreckt"], c:0, u:"Bij de hij-vorm van vertrekken schrijf je een 't': vertrekt."},
    {s:"Dat is een ___ moeilijke som.", o:["hele","heele","heel"], c:0, u:"'Heel' krijgt hier een 'e' erbij, maar geen dubbele e: hele."},
    {s:"Hij heeft zijn huiswerk ___ (afmaken).", o:["afgemaakt","afgemaakd","afgemaact"], c:0, u:"Voltooid deelwoord van 'maken' eindigt op -kt: afgemaakt."},
    {s:"We hopen dat het morgen niet gaat ___.", o:["regenen","reegenen","regennen"], c:0, u:"Het werkwoord 'regenen' heeft één e en één n in de stam: rege-nen."},
    {s:"De ___ van de klas is heel aardig.", o:["juf","juff","juv"], c:0, u:"Kort en simpel: juf, met één f."}
  ],
  c: [
    {s:"Hij ___ (worden) steeds beter in voetbal.", o:["wordt","word","werdt"], c:0, u:"Bij hij/zij + 'worden' schrijf je de d-uitgang: wordt (dt-regel)."},
    {s:"Zij heeft het boek al ___ (lezen).", o:["gelezen","gelesen","gelezenn"], c:0, u:"Voltooid deelwoord van 'lezen' is 'gelezen', met een z."},
    {s:"Dat is een ___ (interessant) verhaal.", o:["interessant","interesant","interessantt"], c:0, u:"Dit leenwoord schrijf je met dubbele s: interes-sant."},
    {s:"De kinderen ___ (worden) om de beurt opgehaald.", o:["worden","werden","wordden"], c:0, u:"De o blijft: 'worden' (niet 'werden', dat is een ander werkwoord)."},
    {s:"Ik vind dit een ___ (fantastisch) idee.", o:["fantastisch","fantasties","fantastich"], c:0, u:"Dit woord eindigt op -isch, ook al hoor je 'ies': fantastisch."},
    {s:"Hij heeft de fiets ___ (repareren).", o:["gerepareerd","gerepareert","gerepareerdt"], c:0, u:"Voltooid deelwoord eindigt op -d omdat de stam niet op t/k/f/s/ch/p eindigt: gerepareerd."},
    {s:"We wonen in een huis met een ___ (tuin) achter.", o:["tuin","tuun","tuijn"], c:0, u:"De tweeklank 'ui' schrijf je met u+i: tuin."},
    {s:"Zij ___ (fietsen) elke dag naar haar werk.", o:["fietst","fiets","fietsd"], c:0, u:"Bij de zij-vorm van 'fietsen' krijg je een extra t: fietst."},
    {s:"Dat is een ___ (bijzonder) mooi schilderij.", o:["bijzonder","bijsonder","bijzondere"], c:0, u:"Dit woord schrijf je met een z, niet een s: bij-zon-der."},

/* ============ MATH GENERATION (per groep 3-8 én per niveau 1-3 binnen die groep) ============ */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }

function makeChoices(answer, spread){
  let set = new Set([answer]);
  while(set.size < 4){
    let d = answer + randInt(-spread,spread);
    if(d !== answer && d >= 0) set.add(d);
  }
  return shuffle([...set]);
}

function explainPlus(a,b,answer){ return `${a} + ${b} = ${answer}. Je telt de twee getallen bij elkaar op.`; }
function explainMinus(a,b,answer){ return `${a} - ${b} = ${answer}. Je haalt ${b} af van ${a}.`; }
function explainKeer(a,b,answer){ return `${a} × ${b} = ${answer}. Dat is ${a} keer het getal ${b} bij elkaar optellen.`; }
function explainDeel(a,b,answer){ return `${a} : ${b} = ${answer}, want ${answer} × ${b} = ${a}.`; }
function explainProcent(pct,base,answer){ return `${pct}% van ${base} = ${answer}. Je rekent: ${pct}/100 × ${base} = ${answer}.`; }
function explainVolgorde(a,b,c,answer){ return `Eerst ${b} × ${c} = ${b*c} uitrekenen, dan pas optellen: ${a} + ${b*c} = ${answer}. Vermenigvuldigen gaat vóór optellen!`; }

function genMathQuestion(groep, subLevel){
  let a,b,op,answer,text;

  if(groep === 3){
    if(subLevel === 1){
      a = randInt(1,10); b = randInt(1,10);
      answer = a+b;
      return { text:`${a} + ${b} = ?`, answer, choices: makeChoices(answer,3), explanation: explainPlus(a,b,answer) };
    }
    if(subLevel === 2){
      op = Math.random()<0.5 ? '+' : '-';
      if(op==='+'){ a=randInt(1,15); b=randInt(1,15); answer=a+b; }
      else { a=randInt(5,20); b=randInt(0,a); answer=a-b; }
      return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,4), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
    }
    op = Math.random()<0.5 ? '+' : '-';
    if(op==='+'){ a=randInt(5,20); b=randInt(5,20); answer=a+b; }
    else { a=randInt(10,20); b=randInt(0,a); answer=a-b; }
    return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,5), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
  }

  if(groep === 4){
    if(subLevel === 1){
      op = Math.random()<0.5 ? '+' : '-';
      if(op==='+'){ a=randInt(10,50); b=randInt(10,50); answer=a+b; }
      else { a=randInt(20,50); b=randInt(1,a); answer=a-b; }
      return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,6), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
    }
    if(subLevel === 2){
      if(Math.random()<0.5){
        op = Math.random()<0.5 ? '+' : '-';
        if(op==='+'){ a=randInt(10,100); b=randInt(10,100); answer=a+b; }
        else { a=randInt(20,100); b=randInt(1,a); answer=a-b; }
        return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,8), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
      }
      a = [2,5,10][randInt(0,2)]; b = randInt(1,10); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,4), explanation: explainKeer(a,b,answer) };
    }
    if(Math.random()<0.4){
      op = Math.random()<0.5 ? '+' : '-';
      if(op==='+'){ a=randInt(10,100); b=randInt(10,100); answer=a+b; }
      else { a=randInt(20,100); b=randInt(1,a); answer=a-b; }
      return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,10), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
    }
    a = randInt(2,10); b = randInt(1,10); answer = a*b;
    return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,5), explanation: explainKeer(a,b,answer) };
  }

  if(groep === 5){
    if(subLevel === 1){
      a = randInt(2,10); b = randInt(2,10); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,5), explanation: explainKeer(a,b,answer) };
    }
    if(subLevel === 2){
      if(Math.random()<0.5){
        op = Math.random()<0.5 ? '+' : '-';
        if(op==='+'){ a=randInt(50,500); b=randInt(50,500); answer=a+b; }
        else { a=randInt(100,999); b=randInt(1,a); answer=a-b; }
        return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,15), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
      }
      b = randInt(2,10); answer = randInt(2,10); a = b*answer;
      return { text:`${a} : ${b} = ?`, answer, choices: makeChoices(answer,3), explanation: explainDeel(a,b,answer) };
    }
    const r = Math.random();
    if(r < 0.34){
      op = Math.random()<0.5 ? '+' : '-';
      if(op==='+'){ a=randInt(100,999); b=randInt(100,999); answer=a+b; }
      else { a=randInt(200,999); b=randInt(1,a); answer=a-b; }
      return { text:`${a} ${op} ${b} = ?`, answer, choices: makeChoices(answer,25), explanation: op==='+'?explainPlus(a,b,answer):explainMinus(a,b,answer) };
    } else if(r < 0.67){
      a = randInt(2,12); b = randInt(2,12); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,7), explanation: explainKeer(a,b,answer) };
    }
    b = randInt(2,12); answer = randInt(2,12); a = b*answer;
    return { text:`${a} : ${b} = ?`, answer, choices: makeChoices(answer,4), explanation: explainDeel(a,b,answer) };
  }

  if(groep === 6){
    if(subLevel === 1){
      a = randInt(11,50); b = randInt(2,9); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,10), explanation: explainKeer(a,b,answer) };
    }
    if(subLevel === 2){
      const pct = [10,25,50][randInt(0,2)];
      const base = [20,40,60,80,100,200][randInt(0,5)];
      answer = Math.round(base*pct/100);
      return { text:`${pct}% van ${base} = ?`, answer, choices: makeChoices(answer, Math.max(2,Math.round(answer*0.3))), explanation: explainProcent(pct,base,answer) };
    }
    if(Math.random()<0.5){
      a = randInt(11,20); b = randInt(2,9); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,12), explanation: explainKeer(a,b,answer) };
    }
    a = randInt(100,900); b = randInt(100,900); answer = a+b;
    return { text:`${a} + ${b} = ?`, answer, choices: makeChoices(answer,30), explanation: explainPlus(a,b,answer) };
  }

  if(groep === 7){
    if(subLevel === 1){
      a = randInt(11,50); b = randInt(2,9); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,15), explanation: explainKeer(a,b,answer) };
    }
    if(subLevel === 2){
      a = randInt(11,30); b = randInt(11,30); answer = a*b;
      return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,20), explanation: explainKeer(a,b,answer) };
    }
    if(Math.random()<0.5){
      const pct = [10,20,25,50,75][randInt(0,4)];
      const base = [40,60,80,100,120,200,240][randInt(0,6)];
      answer = Math.round(base*pct/100);
      return { text:`${pct}% van ${base} = ?`, answer, choices: makeChoices(answer, Math.max(3,Math.round(answer*0.2))), explanation: explainProcent(pct,base,answer) };
    }
    b = randInt(3,12); answer = randInt(3,15); a = b*answer;
    return { text:`${a} : ${b} = ?`, answer, choices: makeChoices(answer,4), explanation: explainDeel(a,b,answer) };
  }

  // groep 8
  if(subLevel === 1){
    a = randInt(11,50); b = randInt(11,50); answer = a*b;
    return { text:`${a} × ${b} = ?`, answer, choices: makeChoices(answer,25), explanation: explainKeer(a,b,answer) };
  }
  if(subLevel === 2){
    const pct = [15,20,25,40,60,75][randInt(0,5)];
    const base = [80,120,160,200,240,300,400][randInt(0,6)];
    answer = Math.round(base*pct/100);
    return { text:`${pct}% van ${base} = ?`, answer, choices: makeChoices(answer, Math.max(3,Math.round(answer*0.2))), explanation: explainProcent(pct,base,answer) };
  }
  a = randInt(20,200); b = randInt(20,200); let c = randInt(2,10);
  answer = a + b*c;
  return { text:`${a} + ${b} × ${c} = ?`, answer, choices: makeChoices(answer,15), explanation: explainVolgorde(a,b,c,answer) };
}

function todayStr(d){
  d = d || new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function migrateNiveauToGroep(n){
  if(n === 1) return 3;
  if(n === 2) return 5;
  if(n === 3) return 7;
  if(n >= 3 && n <= 8) return n;
  return 3;
}

async function loadKids(){
  try{
    const raw = localStorage.getItem('zomer-leeravontuur:kinderen');
    kids = raw ? JSON.parse(raw) : [];
  }catch(e){ kids = []; }
  let changed = false;
  kids.forEach(k=>{
    if(typeof k.totalPoints !== 'number'){ k.totalPoints = 0; changed = true; }
    if(!k.activity){ k.activity = {}; changed = true; }
    if(!k.progress){ k.progress = emptyProgress(); changed = true; }
    ['rekenen','spelling','lezen'].forEach(subj=>{
      if(!k.progress[subj]){ k.progress[subj] = { groep:null, subLevel:1, stars:0 }; changed = true; return; }
      const p = k.progress[subj];
      if(p.niveau !== undefined){
        p.groep = migrateNiveauToGroep(p.niveau);
        delete p.niveau;
        changed = true;
      }
      if(p.groep === undefined){ p.groep = null; changed = true; }
      if(p.subLevel === undefined){ p.subLevel = 1; changed = true; }
      if(p.stars === undefined){ p.stars = 0; changed = true; }
    });
  });
  if(changed) await saveKids();
}
async function saveKids(){
  try{ localStorage.setItem('zomer-leeravontuur:kinderen', JSON.stringify(kids)); }
  catch(e){ console.error('Opslaan mislukt', e); }
}
function emptyProgress(){
  return {
    rekenen:  { groep:null, subLevel:1, stars:0 },
    spelling: { groep:null, subLevel:1, stars:0 },
    lezen:    { groep:null, subLevel:1, stars:0 }
  };
}

function showScreen(id){

/* ============ PROFILES ============ */
function renderProfiles(){
  const grid = document.getElementById('profiles-grid');
  grid.innerHTML = '';
  kids.forEach((k, idx)=>{
    const totalStars = k.progress.rekenen.stars + k.progress.spelling.stars + k.progress.lezen.stars;
    const tile = document.createElement('button');
    tile.className = 'profile-tile';
    tile.innerHTML = `<div class="avatar">${k.avatar}</div><div class="name">${escapeHtml(k.name)}</div><div class="stars">⭐ ${totalStars} · ${k.totalPoints} pt</div>`;
    tile.onclick = ()=> selectKid(idx);
    grid.appendChild(tile);
  });
  const addTile = document.createElement('button');
  addTile.className = 'add-tile';
  addTile.innerHTML = `<div style="font-size:30px;">➕</div><div>Nieuw</div>`;
  addTile.onclick = goAdd;
  grid.appendChild(addTile);
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function goAdd(){
  document.getElementById('new-name').value = '';
  const picker = document.getElementById('avatar-picker');
  picker.innerHTML = '';
  AVATARS.forEach((a,i)=>{
    const b = document.createElement('button');
    b.className = 'avatar-choice' + (i===0 ? ' selected' : '');
    b.textContent = a;
    b.onclick = ()=>{
      [...picker.children].forEach(c=>c.classList.remove('selected'));
      b.classList.add('selected');
    };
    picker.appendChild(b);
  });
  window._pickAvatar = ()=> {
    const sel = picker.querySelector('.selected');
    return sel ? sel.textContent : AVATARS[0];
  };
  showScreen('screen-add');
}

async function createProfile(){
  const name = document.getElementById('new-name').value.trim();
  if(!name){ alert('Vul eerst een naam in!'); return; }
  const avatar = window._pickAvatar ? window._pickAvatar() : AVATARS[0];
  kids.push({ name, avatar, progress: emptyProgress(), totalPoints:0, activity:{} });
  await saveKids();
  goProfiles();
}

function selectKid(idx){
  currentKid = idx;
  goMap();
}

/* ============ MAP ============ */
function starString(n){ return '★'.repeat(n) + '☆'.repeat(3-n); }
function subjectSubText(subject){
  const prog = kids[currentKid].progress[subject];
  if(prog.groep){
    return `Groep ${prog.groep} · niveau ${prog.subLevel} van de 3`;
  }
  const defaults = {
    rekenen:'Optellen, aftrekken, keren & delen',
    spelling:'Woorden goed schrijven',
    lezen:'Verhalen lezen & vragen beantwoorden'
  };
  return defaults[subject];
}
function renderMap(){
  const k = kids[currentKid];
  document.getElementById('map-avatar').textContent = k.avatar;
  document.getElementById('map-name').textContent = k.name;
  document.getElementById('map-total-points').textContent = k.totalPoints;
  document.getElementById('stars-rekenen').textContent = starString(k.progress.rekenen.stars);
  document.getElementById('stars-spelling').textContent = starString(k.progress.spelling.stars);
  document.getElementById('stars-lezen').textContent = starString(k.progress.lezen.stars);
  document.getElementById('sub-rekenen').textContent = subjectSubText('rekenen');

/* ============ LEVEL PICKER ============ */
function openLevelPicker(subject){
  currentSubject = subject;
  const k = kids[currentKid];
  const prog = k.progress[subject];
  currentLevel = prog.groep || 3;
  document.getElementById('level-title').textContent = SUBJECT_META[subject].label;
  const row = document.getElementById('level-row');
  row.innerHTML = '';
  GROEPEN.forEach(g=>{
    const b = document.createElement('button');
    b.className = 'level-btn';
    b.dataset.niv = g;
    b.innerHTML = `Groep ${g}`;
    b.onclick = ()=> pickLevel(g);
    row.appendChild(b);
  });
  pickLevel(currentLevel);
  showScreen('screen-level');
}
function pickLevel(g){
  currentLevel = g;
  document.querySelectorAll('.level-btn').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.niv) === g);
  });
  const k = kids[currentKid];
  const prog = k.progress[currentSubject];
  const subLevel = (prog.groep === g) ? prog.subLevel : 1;
  document.getElementById('level-info').textContent = `Je speelt op niveau ${subLevel} van de 3 in groep ${g}. Bij 90% goed ga je automatisch naar het volgende niveau.`;
}

/* ============ QUIZ BUILD ============ */
function buildQuizItems(subject, groep, subLevel){
  const tier = contentTierFor(groep);
  if(subject === 'rekenen'){
    const items = [];
    for(let i=0;i<8;i++){
      const q = genMathQuestion(groep, subLevel);
      items.push({ type:'math', question:q.text, choices:q.choices.map(String), correctText:String(q.answer), explanation:q.explanation });
    }
    return items;
  }
  if(subject === 'spelling'){
    const bank = shuffle(SPELLING_BANK[tier]).slice(0,8);
    return bank.map(item=>{
      const options = item.o.map((text,i)=>({text, isCorrect:i===item.c}));
      const shuffled = shuffle(options);
      return { type:'spelling', question:item.s, choices:shuffled.map(o=>o.text), correctText:item.o[item.c], explanation:item.u };
    });
  }
  if(subject === 'lezen'){
    const bank = READING_BANK[tier];
    const passage = bank[randInt(0, bank.length-1)];
    return passage.qs.map(item=>{
      const options = item.o.map((text,i)=>({text, isCorrect:i===item.c}));
      const shuffled = shuffle(options);
      return {
        type:'lezen', passageTitle: passage.title, passageText: passage.text,
        question: item.q, choices: shuffled.map(o=>o.text), correctText: item.o[item.c], explanation:item.u
      };
    });
  }
}

async function startQuiz(){
  const k = kids[currentKid];
  const prog = k.progress[currentSubject];
  if(prog.groep !== currentLevel){
    prog.groep = currentLevel;
    prog.subLevel = 1;
    await saveKids();
  }
  quizItems = buildQuizItems(currentSubject, prog.groep, prog.subLevel);
  quizIndex = 0;
  quizCorrectCount = 0;
  document.getElementById('quiz-subject-label').textContent = `${SUBJECT_META[currentSubject].label} · groep ${prog.groep} · niveau ${prog.subLevel}/3`;
  showScreen('screen-quiz');
  renderQuizQuestion();
}

function confirmStopQuiz(){
  if(confirm('Wil je nu stoppen? Deze ronde telt dan niet mee voor punten of niveau.')){
    goMap();
  }
}

function renderQuizQuestion(){
  answering = true;
  const item = quizItems[quizIndex];
  const total = quizItems.length;
  document.getElementById('quiz-progress-fill').style.width = `${(quizIndex/total)*100}%`;
  document.getElementById('quiz-progress-fill').style.background = SUBJECT_META[currentSubject].color;
  document.getElementById('quiz-counter').textContent = `${quizIndex+1} / ${total}`;
  document.getElementById('quiz-feedback').textContent = '';
  const explanationBox = document.getElementById('quiz-explanation');
  explanationBox.classList.add('hidden');
  explanationBox.textContent = '';
  document.getElementById('quiz-next-btn').classList.add('hidden');

  const passageBox = document.getElementById('passage-box');
  if(item.type === 'lezen'){
    passageBox.classList.remove('hidden');
    passageBox.innerHTML = `<strong>${escapeHtml(item.passageTitle)}</strong><br><br>${escapeHtml(item.passageText)}`;
  } else {
    passageBox.classList.add('hidden');
    passageBox.innerHTML = '';
  }

  document.getElementById('quiz-question').textContent = item.question;
  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  item.choices.forEach(choiceText=>{
    const b = document.createElement('button');
    b.className = 'choice-btn';
    b.textContent = choiceText;
    b.onclick = ()=> selectAnswer(choiceText, b);
    choicesEl.appendChild(b);
  });
}

function selectAnswer(choiceText, btnEl){
  if(!answering) return;
  answering = false;
  const item = quizItems[quizIndex];
  const isCorrect = choiceText === item.correctText;
  const buttons = [...document.getElementById('quiz-choices').children];
  buttons.forEach(b=>{
    if(b.textContent === item.correctText) b.classList.add('correct');
    else if(b === btnEl) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  const feedback = document.getElementById('quiz-feedback');
  const explanationBox = document.getElementById('quiz-explanation');
  if(isCorrect){
    quizCorrectCount++;
    feedback.textContent = '✅ Goed gedaan!';
    feedback.style.color = 'var(--success)';
  } else {
    feedback.textContent = `❌ Het juiste antwoord is: ${item.correctText}`;
    feedback.style.color = '#e0563c';
    if(item.explanation){
      explanationBox.textContent = '💡 ' + item.explanation;
      explanationBox.classList.remove('hidden');
    }
  }
  const isLast = (quizIndex === quizItems.length - 1);
  const nextBtn = document.getElementById('quiz-next-btn');
  nextBtn.textContent = isLast ? 'Bekijk je resultaat →' : 'Volgende vraag →';
  nextBtn.classList.remove('hidden');
}

function goNextQuestion(){
  quizIndex++;
  if(quizIndex < quizItems.length) renderQuizQuestion();
  else finishQuiz();
}

async function finishQuiz(){
  const total = quizItems.length;
  const pct = quizCorrectCount / total;
  let starsEarned = 0;
  if(pct >= 0.9) starsEarned = 3;
  else if(pct >= 0.7) starsEarned = 2;
  else if(pct >= 0.4) starsEarned = 1;

  const pointsEarned = quizCorrectCount * 10 + starsEarned * 20;

  const k = kids[currentKid];
  const prog = k.progress[currentSubject];
  if(starsEarned > prog.stars) prog.stars = starsEarned;

  let leveledUp = false;
  if(pct >= 0.9 && prog.subLevel < 3){
    prog.subLevel++;
    leveledUp = true;
  }

  k.totalPoints += pointsEarned;
  const dateKey = todayStr();
  k.activity[dateKey] = (k.activity[dateKey] || 0) + pointsEarned;

  await saveKids();

  document.getElementById('result-stars').textContent = starsEarned > 0 ? '⭐'.repeat(starsEarned) + '☆'.repeat(3-starsEarned) : '💪';
  let msg;
  if(leveledUp){ msg = `🎉 Supergoed! Je gaat naar niveau ${prog.subLevel} in groep ${prog.groep}!`; }
  else if(pct >= 0.9){ msg = 'Fantastisch gedaan!'; }
  else if(pct >= 0.7){ msg = 'Goed bezig!'; }
  else if(pct >= 0.4){ msg = 'Mooie poging!'; }
  else { msg = 'Blijf oefenen, je wordt steeds beter!'; }
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = `Je had ${quizCorrectCount} van de ${total} goed.`;
  document.getElementById('result-points').textContent = `+${pointsEarned} punten verdiend! (totaal ${k.totalPoints})`;
  showScreen('screen-result');
}

/* ============ CALENDAR ============ */
const MONTH_NAMES = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const DOW_LABELS = ['ma','di','wo','do','vr','za','zo'];

function pointsTierClass(pts){
  if(pts <= 0) return '';
  if(pts < 30) return 'lvl1';
  if(pts < 60) return 'lvl2';
  if(pts < 100) return 'lvl3';
  return 'lvl4';
}

function computeStreak(activity){
  let streak = 0;
  let d = new Date();
  while(true){
    const key = todayStr(d);
    if(activity[key] && activity[key] > 0){
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  return streak;
}

function changeCalMonth(delta){
  calMonth += delta;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar(){
  const k = kids[currentKid];
  document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
  document.getElementById('cal-total-points').textContent = k.totalPoints;
  document.getElementById('cal-streak').textContent = computeStreak(k.activity);

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  let startWeekday = firstOfMonth.getDay();
  startWeekday = (startWeekday === 0) ? 6 : startWeekday - 1;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DOW_LABELS.forEach(l=>{
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = l;
    grid.appendChild(el);
  });
  for(let i=0;i<startWeekday;i++){
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  let activeDaysThisMonth = 0;
  const todayKey = todayStr();
  for(let day=1; day<=daysInMonth; day++){
    const pad = n => String(n).padStart(2,'0');
    const dateKey = `${calYear}-${pad(calMonth+1)}-${pad(day)}`;
    const pts = k.activity[dateKey] || 0;
    if(pts > 0) activeDaysThisMonth++;
    const el = document.createElement('div');
    el.className = 'cal-day ' + pointsTierClass(pts) + (dateKey === todayKey ? ' today' : '');
    el.innerHTML = `<span>${day}</span>` + (pts > 0 ? `<span class="pts">+${pts}</span>` : '');
    grid.appendChild(el);
  }
  document.getElementById('cal-days-month').textContent = activeDaysThisMonth;
}

/* ============ INIT ============ */
(async function init(){
  await loadKids();
  goProfiles();
})();
